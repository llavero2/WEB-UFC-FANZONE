<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Contacto | UFC Fanzone</title>
    <link rel="stylesheet" href="CSS UFC.css">
</head>
<body>

    <nav class="menu-superior">
        <div class="logo">UFC <span class="texto-rojo">FANZONE</span></div>
        <div class="enlaces">
            <a href="index.html">Historia</a>
            <a href="pagina 2.html">Peleadores</a>
            <a href="pagina 3.html">Eventos</a>
            <a href="pagina 4.html">Tienda</a>
            <a href="pagina 5.html">Contacto</a>
        </div>
    </nav>

    <main class="contenedor">
        <h2 class="titulo-seccion">Contáctanos</h2>
        
        <div class="formulario-contacto">
            <form action="#" method="POST">
                
                <div class="grupo-form">
                    <label for="nombre">Nombre completo:</label>
                    <input type="text" id="nombre" name="nombre" placeholder="Ej: Jon Jones" required>
                </div>

                <div class="grupo-form">
                    <label for="email">Correo electrónico:</label>
                    <input type="email" id="email" name="email" placeholder="ejemplo@correo.com" required>
                </div>

                <div class="grupo-form">
                    <label for="asunto">Asunto:</label>
                    <input type="text" id="asunto" name="asunto" placeholder="Duda sobre envíos de tienda">
                </div>

                <div class="grupo-form">
                    <label for="mensaje">Mensaje:</label>
                    <textarea id="mensaje" name="mensaje" rows="5" placeholder="Escribe tu mensaje aquí..." required></textarea>
                </div>

                <button type="submit" class="btn-rojo" style="width: 100%;">Enviar Mensaje</button>

            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2024 UFC Fanzone. Proyecto Web.</p>
    </footer>

</body>
</html>
